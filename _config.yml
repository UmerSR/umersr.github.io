content:
  - title: Projects # Title for the section
    layout: list # Type of content section (list/text)
    content:

      - layout: top-middle
        title: ContinuumAI
        link: https://github.com/UmerSR/P13-ContinuumAI
        github: P13-ContinuumAI
        quote: >
          AI-native decision intelligence platform combining conversational analytics, chart generation, profiling, and strategy-aware workflows.
        description: |
          Built a full-stack decision intelligence system designed to let users interact with business data through natural language, dynamic charts, and dashboard-style visual workflows. The platform supports conversational analytics, automated chart generation, dataset profiling, KPI/strategy-layer integration, and decision-support utilities such as forecasting, anomaly detection, segmentation, and KPI evaluation.

          Worked across backend and frontend architecture, including typed schemas, orchestration logic, chart workflows, profiling pipelines, strategy configuration, and UX improvements for multi-turn analytical interaction. The system was designed to go beyond static dashboards by combining AI-driven reasoning with structured analytics and business context.

    
      - layout: top-middle
        title: Early Alzheimer's Disease Detection using BioMedCLIP
        link: github.com/UmerSR/CS-437-Final-Project
        github: CS-437-Final-Project
        additional_links:
          - title: UmerSR/CS-437-Final-Project
            icon: fab fa-github
            url: github.com/UmerSR/CS-437-Final-Project
        quote: >
          Worked on developing foundation models integrating DL/CV methodologies with SOTA VLMs for early Alzheimer's Disease detection.
        description: |
          Achieved 93.14% Binary Classification accuracy and 85.27% Multi-Class Classification Accuracy on the OASIS-I Dataset by augmenting BioMedCLIP with a custom classification head and enhanced domain-specific caption generation - outperforming all baselines methods available at the time.

          Integrated EigenCAM for explainability.

      - layout: top-middle
        title: Self-Play Reinforcement Learning Without Tree Search in Connect Four
        link: https://github.com/UmerSR/Connect-Four-RL
        github: Connect-Four-RL
        quote: >
          End-to-end reinforcement learning experiments for Connect Four using self-play agents, analysis notebooks, and a playable GUI.
        description: |
          Built a Connect Four reinforcement learning project featuring a custom environment, multiple self-play agents, and experiment pipelines using PPO, DQN, and REINFORCE. The repository includes training notebooks, saved model artifacts, evaluation and comparison notebooks, and an interactive GUI for playing against trained agents.

          Also includes an agent-vs-agent simulator, guided and online opponent modes, and project documentation/checkpoint reports. The repository is structured around reproducible RL experimentation, model comparison, and interactive gameplay.


