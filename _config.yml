  A self-driven and motivated individual seeking further education and professional opportunities in AI/ML/DL and adjacent domains. Prior professional experience as an AI Analyst at a leading IIoT firm in the telecom sector, and as an Audio DSP Engineer at a multinational tech firm. Currently a Senior at LUMS, enrolled in the BS Computer Science programme.

